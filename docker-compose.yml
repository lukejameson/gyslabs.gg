services:
  gsylabs:
    build: .
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gsylabs.rule=Host(`gsylabs.gg`)"
      - "traefik.http.routers.gsylabs.entrypoints=websecure"
      - "traefik.http.routers.gsylabs.tls.certresolver=letsencrypt"
      - "traefik.http.services.gsylabs.loadbalancer.server.port=80"

networks:
  web:
    external: true
